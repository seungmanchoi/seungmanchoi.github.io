<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block Aurora Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 32px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #edf7ff;
      background: radial-gradient(circle at 20% 0%, #123a64 0, transparent 32%),
                  radial-gradient(circle at 80% 10%, #742a87 0, transparent 30%),
                  #05070f;
      line-height: 1.7;
    }
    main {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      background: rgba(5, 7, 15, 0.72);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
    }
    .app-name {
      color: #73f7ff;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1 {
      margin-top: 8px;
      font-size: 34px;
      line-height: 1.15;
    }
    p { margin-top: 16px; color: #cbd7e7; }
    ul { margin: 18px 0 0 22px; color: #cbd7e7; }
    li { margin: 8px 0; }
    a { color: #73f7ff; text-decoration: none; font-weight: 700; }
    a:hover { text-decoration: underline; }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }
    .link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
      padding: 10px 14px;
      border: 1px solid rgba(115, 247, 255, 0.32);
      border-radius: 10px;
      background: rgba(115, 247, 255, 0.08);
    }
  </style>
</head>
<body>
  <main>
    <div class="app-name">Block Aurora</div>
    <h1>Support</h1>
    <p>Block Aurora is an offline neon polyomino puzzle game for iOS and Android.</p>
    <p>For support, bug reports, privacy questions, or store inquiries, contact the developer:</p>
    <ul>
      <li>Email: <a href="mailto:blueng.choi@gmail.com">blueng.choi@gmail.com</a></li>
      <li>Developer: Seungman Choi</li>
    </ul>
    <div class="links">
      <a class="link" href="./privacy.html">Privacy Policy</a>
      <a class="link" href="https://seungmanchoi.github.io">Developer Site</a>
    </div>
  </main>
</body>
</html>
